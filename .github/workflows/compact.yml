name: Compact

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: false
        default: 'compact'
        type: choice
        options:
          - compact
          - rebuild

jobs:
  compact:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger admin endpoint
        run: |
          set -euo pipefail
          ACTION="${{ inputs.action || 'compact' }}"
          MAX_ITERATIONS=50
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_ITERATIONS); do
            echo "--- Iteration $i/$MAX_ITERATIONS ---"
            success=false
            for retry in $(seq 1 $MAX_RETRIES); do
              response=$(curl -s -w "\n%{http_code}" -X POST \
                "${{ vars.APP_URL }}/api/admin/${ACTION}" \
                -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
              http_code=$(echo "$response" | tail -1)
              body=$(echo "$response" | head -n -1)
              echo "Response: $body"
              echo "HTTP Status: $http_code"
              if [ "$http_code" -eq 200 ]; then
                success=true
                break
              fi
              if [ "$retry" -lt "$MAX_RETRIES" ]; then
                echo "Attempt $retry failed (HTTP $http_code), retrying in $((retry * 3))s..."
                sleep $((retry * 3))
              fi
            done
            if [ "$success" != "true" ]; then
              echo "$ACTION failed after $MAX_RETRIES attempts with status $http_code"
              exit 1
            fi
            remaining=$(echo "$body" | grep -o '"entriesRemaining":[0-9]*' | grep -o '[0-9]*' || true)
            if [ -z "$remaining" ] || [ "$remaining" -eq 0 ]; then
              echo "No entries remaining, done."
              break
            fi
            echo "$remaining entries remaining, continuing..."
            sleep 2
          done
